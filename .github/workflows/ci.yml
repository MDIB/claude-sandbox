name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Build image
        run: docker build --network=host -t claude-code-sandbox .

      - name: Run integration tests
        run: bash test.sh
